services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: "file:/data/dev.db"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET before starting compose}"
      CORS_ORIGINS: "http://localhost:3000"
      TRUST_PROXY: "false"
      LOG_LEVEL: "info"
      SMS_PROVIDER: "${SMS_PROVIDER:-mock}"
      SMS_ACCESS_KEY: "${SMS_ACCESS_KEY:-}"
      SMS_ACCESS_SECRET: "${SMS_ACCESS_SECRET:-}"
      SMS_SIGN_NAME: "${SMS_SIGN_NAME:-}"
      SMS_TEMPLATE_CODE: "${SMS_TEMPLATE_CODE:-}"
      SMS_TEMPLATE_PARAM_NAME: "${SMS_TEMPLATE_PARAM_NAME:-code}"
      SMS_APP_ID: "${SMS_APP_ID:-}"
      SMS_REGION: "${SMS_REGION:-ap-guangzhou}"
      SMS_DEFAULT_COUNTRY_CODE: "${SMS_DEFAULT_COUNTRY_CODE:-+86}"
      SMS_TIMEOUT_MS: "${SMS_TIMEOUT_MS:-5000}"
      RUN_MIGRATIONS_ON_START: "${RUN_MIGRATIONS_ON_START:-true}"
      POSTGRES_DATABASE_URL: "postgresql://travel_glow:travel_glow@postgres:5432/travel_glow?schema=public"
    volumes:
      - travel_glow_uploads:/app/server/uploads
      - travel_glow_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: travel_glow
      POSTGRES_USER: travel_glow
      POSTGRES_PASSWORD: travel_glow
    ports:
      - "5432:5432"
    volumes:
      - travel_glow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel_glow -d travel_glow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  travel_glow_uploads:
  travel_glow_data:
  travel_glow_pgdata:
