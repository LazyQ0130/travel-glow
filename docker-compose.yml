services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: "file:/data/travel-glow.db"
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET before starting compose}"
      CORS_ORIGINS: "http://localhost:3000"
      TRUST_PROXY: "false"
      LOG_LEVEL: "info"
      RATE_LIMIT_REDIS_ENABLED: "${RATE_LIMIT_REDIS_ENABLED:-true}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_POOL_SIZE: "${REDIS_POOL_SIZE:-4}"
      REDIS_CONNECT_TIMEOUT_MS: "${REDIS_CONNECT_TIMEOUT_MS:-1000}"
      REDIS_COMMAND_TIMEOUT_MS: "${REDIS_COMMAND_TIMEOUT_MS:-500}"
      REDIS_FAILURE_COOLDOWN_MS: "${REDIS_FAILURE_COOLDOWN_MS:-30000}"
      EMAIL_PROVIDER: "${EMAIL_PROVIDER:?Set EMAIL_PROVIDER=smtp before starting production compose}"
      SMTP_HOST: "${SMTP_HOST:?Set SMTP_HOST before starting production compose}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:?Set SMTP_USER before starting production compose}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:?Set SMTP_PASSWORD before starting production compose}"
      SMTP_FROM: "${SMTP_FROM:?Set SMTP_FROM before starting production compose}"
      SMTP_TIMEOUT_MS: "${SMTP_TIMEOUT_MS:-10000}"
      RUN_MIGRATIONS_ON_START: "${RUN_MIGRATIONS_ON_START:-true}"
    volumes:
      - travel_glow_uploads:/app/server/uploads
      - travel_glow_data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - travel_glow_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  travel_glow_uploads:
  travel_glow_data:
  travel_glow_redisdata:
